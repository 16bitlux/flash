<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flash</title>

  <style>
    :root {
      --background: #f4f1ea;
      --card: #ffffff;
      --text: #222222;
      --muted: #555555;
      --alert-bg: #ffe8e8;
      --alert-text: #9b111e;
      --call: #10B981;
      --call-hover: #059669;
      --whatsapp: #25D366;
      --whatsapp-hover: #1DA851;
      --email: #2563EB;
      --email-hover: #1D4ED8;
      --location: #F59E0B;
      --location-hover: #D97706;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--background);
      color: var(--text);
    }

    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 22px;
    }

    .card {
      background: var(--card);
      border-radius: 26px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .language {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .language button {
      width: auto;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eeeeee;
      color: #222;
      font-size: 14px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .language button.active {
      background: #111;
      color: white;
    }

    .alert {
      background: var(--alert-bg);
      color: var(--alert-text);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .dog-photo {
      width: 190px;
      height: 190px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 40px;
      margin: 0 0 8px;
    }

    .urgent {
      font-size: 21px;
      font-weight: bold;
      margin: 14px 0;
    }

    p {
      line-height: 1.5;
    }

    input,
    textarea,
    button.submit,
    button.location {
      width: 100%;
      margin: 10px 0;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #dddddd;
      font-size: 17px;
      font-family: Arial, Helvetica, sans-serif;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      margin-top: 20px;
    }

    .action,
    button.submit,
    button.location {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      color: white;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      font-size: 18px;
      margin: 12px 0;
    }

    .action:hover,
    button.submit:hover,
    button.location:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .call {
      background: var(--call);
    }

    .call:hover {
      background: var(--call-hover);
    }

    .whatsapp {
      background: var(--whatsapp);
    }

    .whatsapp:hover {
      background: var(--whatsapp-hover);
    }

    .email,
    button.submit {
      background: var(--email);
    }

    .email:hover,
    button.submit:hover {
      background: var(--email-hover);
    }

    button.location {
      background: var(--location);
    }

    button.location:hover {
      background: var(--location-hover);
    }

    .icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .thanks {
      margin-top: 24px;
      font-size: 17px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <div class="language">
        <button onclick="setLanguage('en')" id="btn-en">EN</button>
        <button onclick="setLanguage('fr')" id="btn-fr">FR</button>
        <button onclick="setLanguage('lu')" id="btn-lu">LU</button>
      </div>

      <div class="alert" id="alert"></div>

      <img class="dog-photo" src="dog.jpg" alt="Photo of Flash">

      <h1>Flash</h1>
      <!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="Flash 🐾 Lost Dog">
<meta property="og:description" content="If you've found Flash, please help me get back home. I am microchipped and friendly, but I may be frightened.">
<meta property="og:image" content="https://findmydog.online/share.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://findmydog.online">
<meta property="og:site_name" content="Find My Dog">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Flash 🐾 Lost Dog">
<meta name="twitter:description" content="If you've found Flash, please help me get back home.">
<meta name="twitter:image" content="https://findmydog.online/share.png">

      <p class="urgent" id="subtitle"></p>
      <p id="intro"></p>

      <button class="location" id="locationButton" onclick="shareLocation()"></button>

      <form id="contactForm" method="POST">
        <input type="text" name="name" id="nameInput">
        <textarea name="message" id="messageInput" required></textarea>
        <input type="hidden" name="location" id="locationInput">
        <input type="hidden" name="dog" value="Flash">
        <button class="submit" id="submitButton" type="submit"></button>
      </form>

      <p id="status" class="small"></p>
      <div class="thanks" id="thanks"></div>
    </section>
  </main>

  <script>
    const dogName = "Flash";
    const formEndpoint = "https://formspree.io/f/mzdlwzbo";

    const locationIcon = `
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
      </svg>`;

    const sendIcon = `
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L6 12Zm0 0h7.5" />
      </svg>`;

    const texts = {
      en: {
        alert: "🚨 Lost dog",
        subtitle: "Please help me reunite with my family.",
        intro: `My name is <strong>${dogName}</strong>. I am microchipped. I am friendly, but I may be frightened. Please send my owner a message as soon as possible.`,
        location: "Share my location",
        namePlaceholder: "Your name optional",
        messagePlaceholder: "Write a short message",
        submit: "Send message to owner",
        thanks: "❤️ Thank you for helping me get home.",
        locationAsk: "Asking for permission to share location...",
        locationAdded: "Location added to the message.",
        locationUnsupported: "Location sharing is not supported on this device.",
        locationDenied: "Location permission was not granted. You can still send a message.",
        positionUnavailable: "Location unavailable. Please try again outdoors or with GPS enabled.",
        timeout: "Location request timed out. Please try again.",
        sent: "Thank you. Your message has been sent.",
        error: "Sorry, the message could not be sent. Please try again."
      },
      fr: {
        alert: "🚨 Chien perdu",
        subtitle: "Aidez moi à retrouver ma famille.",
        intro: `Je m'appelle <strong>${dogName}</strong>. Je suis identifié par puce électronique. Je suis gentil, mais je peux avoir peur. Merci d'envoyer un message à mon propriétaire dès que possible.`,
        location: "Partager ma position",
        namePlaceholder: "Votre nom optionnel",
        messagePlaceholder: "Écrivez un court message",
        submit: "Envoyer un message au propriétaire",
        thanks: "❤️ Merci de m'aider à rentrer chez moi.",
        locationAsk: "Demande d'autorisation pour partager la position...",
        locationAdded: "La position a été ajoutée au message.",
        locationUnsupported: "Le partage de position n'est pas disponible sur cet appareil.",
        locationDenied: "La position n'a pas été partagée. Vous pouvez quand même envoyer un message.",
        positionUnavailable: "La position n'est pas disponible. Merci de réessayer dehors ou avec le GPS activé.",
        timeout: "La demande de position a expiré. Merci de réessayer.",
        sent: "Merci. Votre message a été envoyé.",
        error: "Désolé, le message n'a pas pu être envoyé. Merci de réessayer."
      },
      lu: {
        alert: "🚨 Hond vermësst",
        subtitle: "Hëlleft mir, meng Famill erëmzefannen.",
        intro: `Mäin Numm ass <strong>${dogName}</strong>. Ech hunn en Chip. Ech si frëndlech, mee ech kann Angscht hunn. Schéckt w.e.g. esou séier wéi méiglech eng Noriicht u mäi Besëtzer.`,
        location: "Meng Positioun deelen",
        namePlaceholder: "Ären Numm optional",
        messagePlaceholder: "Schreift eng kuerz Noriicht",
        submit: "Noriicht un de Besëtzer schécken",
        thanks: "❤️ Merci, datt Dir mir hëlleft heemzekommen.",
        locationAsk: "Erlaabnis fir d'Positioun ze deelen gëtt ugefrot...",
        locationAdded: "D'Positioun gouf an d'Noriicht bäigesat.",
        locationUnsupported: "Positioun deelen ass op dësem Apparat net méiglech.",
        locationDenied: "D'Positioun gouf net gedeelt. Dir kënnt awer nach eng Noriicht schécken.",
        positionUnavailable: "D'Positioun ass net verfügbar. Probéiert w.e.g. nach eng Kéier dobaussen oder mat ageschaltem GPS.",
        timeout: "D'Ufro fir d'Positioun huet ze laang gedauert. Probéiert w.e.g. nach eng Kéier.",
        sent: "Merci. Är Noriicht gouf geschéckt.",
        error: "Pardon, d'Noriicht konnt net geschéckt ginn. Probéiert w.e.g. nach eng Kéier."
      }
    };

    let currentLanguage = "en";

    function setLanguage(language) {
      currentLanguage = language;
      const t = texts[language];

      document.documentElement.lang = language;
      document.getElementById("alert").textContent = t.alert;
      document.getElementById("subtitle").textContent = t.subtitle;
      document.getElementById("intro").innerHTML = t.intro;
      document.getElementById("locationButton").innerHTML = locationIcon + "<span>" + t.location + "</span>";
      document.getElementById("nameInput").placeholder = t.namePlaceholder;
      document.getElementById("messageInput").placeholder = t.messagePlaceholder;
      document.getElementById("submitButton").innerHTML = sendIcon + "<span>" + t.submit + "</span>";
      document.getElementById("thanks").textContent = t.thanks;

      document.querySelectorAll(".language button").forEach(button => {
        button.classList.remove("active");
      });

      document.getElementById("btn-" + language).classList.add("active");
    }

    function shareLocation() {
      const status = document.getElementById("status");
      const t = texts[currentLanguage];

      if (!navigator.geolocation) {
        status.textContent = t.locationUnsupported;
        return;
      }

      status.textContent = t.locationAsk;

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

          document.getElementById("locationInput").value = mapLink;

          const messageBox = document.getElementById("messageInput");
          const currentMessage = messageBox.value.trim();

          if (currentMessage.length > 0) {
            messageBox.value = currentMessage + "\n\nLocation: " + mapLink;
          } else {
            messageBox.value = "Location: " + mapLink;
          }

          status.textContent = t.locationAdded;
        },
        function(error) {
          if (error.code === error.PERMISSION_DENIED) {
            status.textContent = t.locationDenied;
          } else if (error.code === error.POSITION_UNAVAILABLE) {
            status.textContent = t.positionUnavailable;
          } else if (error.code === error.TIMEOUT) {
            status.textContent = t.timeout;
          } else {
            status.textContent = t.locationDenied;
          }
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    document.getElementById("contactForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const status = document.getElementById("status");
      const t = texts[currentLanguage];
      const form = event.target;
      const data = new FormData(form);

      try {
        const response = await fetch(formEndpoint, {
          method: "POST",
          body: data,
          headers: {
            "Accept": "application/json"
          }
        });

        if (response.ok) {
          status.textContent = t.sent;
          form.reset();
        } else {
          status.textContent = t.error;
        }
      } catch (error) {
        status.textContent = t.error;
      }
    });

    const browserLanguage = navigator.language.toLowerCase();

    if (browserLanguage.startsWith("fr")) {
      setLanguage("fr");
    } else if (
      browserLanguage.startsWith("lb") ||
      browserLanguage.startsWith("lu") ||
      browserLanguage.startsWith("de")
    ) {
      setLanguage("lu");
    } else {
      setLanguage("en");
    }
  </script>
</body>
</html>
